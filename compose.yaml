services:
  frontend:
    container_name: susm-frontend
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped

  backend:
    container_name: susm-backend
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/target
    command: ./mvnw spring-boot:run
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

