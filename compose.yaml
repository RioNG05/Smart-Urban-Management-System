version: '3.8'

services:
  frontend:
    container_name: susm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080 
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: susm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/target
    command: ./mvnw spring-boot:run
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: susm-sqlserver
    restart: always
    environment:
      SA_PASSWORD: "Sums@!2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./db/SUMS.sql:/init.sql              # 🔥 mount file sql
      - ./db/init-db.sh:/init-db.sh          # 🔥 script chạy sql
    command: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr &
      /init-db.sh
      wait
      "

  adminer:
    image: adminer
    container_name: susm-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  sql_data: